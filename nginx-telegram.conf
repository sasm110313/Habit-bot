# ═══════════════════════════════════════════════════════════════════════════════
# Nginx config for Habit Bot Mini App
# Domain: telegram.acadeo.ir
# 
# This file should be placed at: /etc/nginx/sites-available/telegram.acadeo.ir
# Then symlinked to: /etc/nginx/sites-enabled/
#
# IMPORTANT: Does NOT interfere with existing nginx configs!
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name telegram.acadeo.ir;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name telegram.acadeo.ir;

    # SSL certificates (Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/telegram.acadeo.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telegram.acadeo.ir/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

    # Static files (Mini App frontend)
    root /opt/habit-bot/webapp;
    index index.html;

    # Main page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to bot's internal API server
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";

        # Handle preflight
        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
